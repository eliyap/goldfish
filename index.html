<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goldfish</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <form id="login-form" autocomplete="on">
      <label for="username">Provider</label>
      <input type="text" id="username" name="username" autocomplete="username" list="providers" value="Sonnet">
      <datalist id="providers">
        <option value="Haiku">
        <option value="Sonnet">
        <option value="Opus">
        <option value="OpenAI">
        <option value="OpenAI-Flex">
      </datalist>
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" name="password" autocomplete="current-password"
             placeholder="sk-ant-... or sk-..." required>
      <button type="submit" id="unlock-btn">Unlock</button>
      <div id="login-error"></div>
    </form>

    <nav id="apps" hidden>
      <ul>
        <li><a href="/ask.html">Ask</a></li>
        <li><a href="/grammar.html">Grammar</a></li>
        <li><a href="/flashcard.html">Flashcard</a></li>
      </ul>
    </nav>
  </div>

  <script type="module">
    import { shell } from './js/shell.js';
    import { isLoggedIn, login, validate } from './js/auth.js';

    shell({ auth: false });

    const loginForm = document.getElementById('login-form');
    const appsEl = document.getElementById('apps');
    const unlockBtn = document.getElementById('unlock-btn');
    const loginError = document.getElementById('login-error');

    function show() {
      const loggedIn = isLoggedIn();
      loginForm.hidden = loggedIn;
      appsEl.hidden = !loggedIn;
    }

    show();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const provider = document.getElementById('username').value.trim();
      const key = document.getElementById('api-key').value.trim();
      if (!key || !provider) return;

      unlockBtn.disabled = true;
      loginError.textContent = '';

      try {
        await validate(provider, key);
        login(provider, key);
        window.location.reload();
      } catch (err) {
        loginError.textContent = err.message;
      } finally {
        unlockBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
