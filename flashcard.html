<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <form id="flashcard-form">
      <details>
        <summary>System prompt</summary>
        <textarea id="prompt" rows="16">You are a Japanese flashcard generator for Mochi flashcard app. When given a word, use web search to look it up on Wiktionary and find example sentences on tatoeba.org.

Produce a flashcard in this exact format. The --- divider separates the FRONT (English) from the BACK (Japanese). No Japanese text may appear above the ---.

FRONT (English only, no Japanese):
# English meaning(s)
[optional English context, e.g. "e.g. it's a bit small"]
#[part of speech]
---
BACK (Japanese):
# [kanji with inline furigana](URL to Wiktionary or dictionary source)
[Example:](URL to tatoeba.org sentence) Japanese example sentence
English translation of the example.
#past {{[past form]}}
#negative {{[negative form]}}
#potential {{[potential form]}}
#volitional {{[volitional form]}}

Rules:
- NOTHING in Japanese above the --- line. The front of the card is English only.
- Definitions MUST link to their source (Wiktionary, Jisho, etc.)
- Citations use the format [Example:](URL) followed by the text, e.g. [Example:](https://tatoeba.org/...) 食べました
- The h1 Japanese word on the back is the link to the definition source, e.g. # [食(た)べる](https://en.wiktionary.org/wiki/食べる)
- English translation goes on the next line after the example
- Furigana in parentheses after each kanji: 食(た)べる, 持(も)つ, 悲(かな)しい
- Only include conjugation lines for verbs
- Part of speech: #verb, #adjective, #adverb, #noun, #particle, #expression
- Output ONLY the flashcard, no preamble or explanation</textarea>
      </details>
      <label for="term">Word or phrase</label>
      <div class="input-row">
        <textarea id="term" rows="1" placeholder="食べる" required></textarea>
        <button type="submit" id="go-btn">Go</button>
      </div>
    </form>
    <div id="answer-wrap">
      <div id="answer"></div>
      <button id="copy-btn" hidden>Copy</button>
    </div>
  </div>

  <script type="module">
    import { shell } from './js/shell.js';
    import { chat } from './js/llm.js';

    if (!shell({ title: 'Flashcard' })) throw new Error('redirecting');

    const form = document.getElementById('flashcard-form');
    const promptEl = document.getElementById('prompt');
    const termEl = document.getElementById('term');
    const goBtn = document.getElementById('go-btn');
    const answerEl = document.getElementById('answer');
    const copyBtn = document.getElementById('copy-btn');
    let rawMarkdown = '';

    function copyText(text) {
      if (navigator.clipboard) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    copyBtn.addEventListener('click', () => {
      copyText(rawMarkdown);
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });

    termEl.focus();

    termEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.metaKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    const WEB_SEARCH = {
      type: 'web_search_20250305',
      name: 'web_search',
      max_uses: 5,
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const t = termEl.value.trim();
      if (!t) return;

      goBtn.disabled = true;
      copyBtn.hidden = true;
      answerEl.textContent = '...';

      rawMarkdown = await chat(
        [{ role: 'user', content: t }],
        { system: promptEl.value.trim(), tools: [WEB_SEARCH] },
      );
      answerEl.textContent = rawMarkdown;
      copyBtn.hidden = false;
      goBtn.disabled = false;
    });
  </script>
</body>
</html>
